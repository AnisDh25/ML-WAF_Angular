<div class="waf-settings">
  <div class="page-header">
    <h2><i class="fas fa-cog me-2"></i>WAF Settings</h2>
    <p class="text-muted">Configure Web Application Firewall settings</p>
  </div>

  <div class="card">
    <div class="card-header">
      <h5><i class="fas fa-network-wired me-2"></i>Proxy Configuration</h5>
    </div>
    <div class="card-body">
      <div class="row">
        <div class="col-md-6">
          <div class="mb-3">
            <label for="proxyHost" class="form-label">Host</label>
            <input type="text" class="form-control" id="proxyHost" [(ngModel)]="settings.proxy.host">
          </div>
        </div>
        <div class="col-md-6">
          <div class="mb-3">
            <label for="proxyPort" class="form-label">Port</label>
            <input type="number" class="form-control" id="proxyPort" [(ngModel)]="settings.proxy.port">
          </div>
        </div>
      </div>
      <div class="mb-3">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="proxyEnabled" [(ngModel)]="settings.proxy.enabled">
          <label class="form-check-label" for="proxyEnabled">
            Enable Proxy
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="card mt-4">
    <div class="card-header">
      <h5><i class="fas fa-brain me-2"></i>ML Classifier</h5>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label for="mlThreshold" class="form-label">Threshold ({{ (settings.ml_classifier.threshold * 100).toFixed(0) }}%)</label>
        <input type="range" class="form-range" id="mlThreshold" 
               min="0" max="1" step="0.1" [(ngModel)]="settings.ml_classifier.threshold">
      </div>
      <div class="mb-3">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="mlEnabled" [(ngModel)]="settings.ml_classifier.enabled">
          <label class="form-check-label" for="mlEnabled">
            Enable ML Classifier
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="card mt-4">
    <div class="card-header">
      <h5><i class="fas fa-filter me-2"></i>Content Filter</h5>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" id="contentEnabled" [(ngModel)]="settings.content_filter.enabled">
          <label class="form-check-label" for="contentEnabled">
            Enable Content Filter
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-4">
    <button class="btn btn-primary" (click)="saveSettings()" [disabled]="isSaving">
      <i class="fas fa-save me-2"></i>
      <span *ngIf="!isSaving">Save Settings</span>
      <span *ngIf="isSaving">Saving...</span>
    </button>
    <button class="btn btn-secondary ms-2">Reset to Defaults</button>
  </div>
</div>
